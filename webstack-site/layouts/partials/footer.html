<script type="text/javascript">
    $(document).ready(function(){
        var siteWelcome = $('#loading');
        siteWelcome.addClass('close');
        setTimeout(function() {
            siteWelcome.remove();
        }, 600);

        /* 移动端侧边栏：不用 Bootstrap modal，自行 toggle */
        function openMobileSidebar() {
            $('#sidebar').addClass('show');
            $('<div class="mobile-sidebar-backdrop"></div>')
                .css({
                    position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                    background: 'rgba(0,0,0,0.35)', zIndex: 1089
                })
                .appendTo('body')
                .on('click', closeMobileSidebar);
            $('body').css('overflow', 'hidden');
        }
        window.closeMobileSidebar = function() {
            $('#sidebar').removeClass('show');
            $('.mobile-sidebar-backdrop').remove();
            $('body').css('overflow', '');
        };

        $(document).on('click', '#sidebar-switch', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if ($(window).width() < 768) {
                if ($('#sidebar').hasClass('show')) {
                    closeMobileSidebar();
                } else {
                    openMobileSidebar();
                }
            } else {
                $('#sidebar').removeClass('mini-sidebar');
            }
        });
    });
</script>
<script>
    $(document).ready(function(){
        function toggleWikiLayout(isWiki) {
            $('.page-container').toggleClass('wiki-layout', isWiki);
            $('#sidebar').toggleClass('wiki-sidebar-hidden', isWiki);
            if (isWiki) {
                $('#header').removeClass('sticky');
            } else {
                $('#header').addClass('sticky');
            }
        }

        function showHomeView() {
            $('#wiki-view').addClass('d-none');
            $('#page-content-view, #home-view').removeClass('d-none');
            $('.navbar-nav.site-menu a[data-view-mode]').removeClass('active');
            $('.navbar-nav.site-menu a[data-view-mode="home"]').addClass('active');
            toggleWikiLayout(false);
        }

        function showWikiView() {
            var iframe = $('#wiki-iframe');
            if (!iframe.attr('src')) {
                iframe.attr('src', iframe.data('src'));
            }
            $('#home-view').addClass('d-none');
            $('#wiki-view, #page-content-view').removeClass('d-none');
            $('.navbar-nav.site-menu a[data-view-mode]').removeClass('active');
            $('.navbar-nav.site-menu a[data-view-mode="wiki"]').addClass('active');
            toggleWikiLayout(true);
        }

        setTimeout(function () {
            if ($('a.smooth[href="' + window.location.hash + '"]')[0]) {
                $('a.smooth[href="' + window.location.hash + '"]').click();
            }else if (window.location.hash != '' && window.location.hash != '#wiki-view') {
                $("html, body").animate({
                    scrollTop: $(window.location.hash).offset().top - 90
                }, {
                    duration: 500,
                    easing: "swing"
                });
            }
        }, 300);
        $(document).on('click','a.smooth',function(ev) {
            if($('#sidebar').hasClass('show') && !$(this).hasClass('change-href')){
                closeMobileSidebar();
            }
            if($(this).attr("href").substr(0, 1) == "#"){
                $("html, body").animate({
                    scrollTop: $($(this).attr("href")).offset().top - 90
                }, {
                    duration: 500,
                    easing: "swing"
                });
            }
            if($(this).hasClass('go-search-btn')){
                $('#search-text').focus();
            }
            if(!$(this).hasClass('change-href')){
                var menu =  $("a"+$(this).attr("href"));
                menu.click();
                toTarget(menu.parent().parent(),true,true);
            }
        });
        $(document).on('click','a.tab-noajax',function(ev) {
            var url = $(this).data('link');
            if(url)
                $(this).parents('.d-flex.flex-fill.flex-tab').children('.btn-move.tab-move').show().attr('href', url);
            else
                $(this).parents('.d-flex.flex-fill.flex-tab').children('.btn-move.tab-move').hide();
        });
        $(document).on('click', '.navbar-nav.site-menu a[data-view-mode="wiki"]', function(ev) {
            ev.preventDefault();
            showWikiView();
        });
        $(document).on('click', '.navbar-nav.site-menu a[data-view-mode="home"]', function(ev) {
            ev.preventDefault();
            showHomeView();
        });
        if (window.location.hash === '#wiki-view') {
            showWikiView();
        } else {
            showHomeView();
        }

    });
</script>

<script>
//夜间(日间)模式
(function(){
    if(document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") === ''){
        if(new Date().getHours() > 22 || new Date().getHours() < 6){
            document.body.classList.remove('io-black-mode');
            document.body.classList.add('io-grey-mode');
            document.cookie = "night=1;path=/";
            console.log('夜间模式开启');
        }else{
            document.body.classList.remove('night');
            document.cookie = "night=0;path=/";
            console.log('夜间模式关闭');
        }
    }else{
        var night = document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") || '0';
        if(night == '0'){
            document.body.classList.remove('night');
        }else if(night == '1'){
            document.body.classList.add('night');
        }
    }
})();
//夜间(日间)模式切换

    if(night == '0'){
	$("#search-bg").css("background-image", "url({{ $.Site.Params.images.searchImageL }})");

        document.body.classList.remove('io-black-mode');
        document.body.classList.add('io-grey-mode');
        document.cookie = "night=0;path=/"
        console.log(' ');
        $(".switch-dark-mode").attr("data-original-title","夜间模式");
        $(".mode-ico").removeClass("icon-light");
        $(".mode-ico").addClass("icon-night");
    }
}
</script>
