<div class="main-content flex-fill grid-bg">
    <div class="big-header-banner">
        <div id="header" class="page-header sticky">
            <div class="navbar navbar-expand-md">
                <div class="container-fluid p-0">

                                        <a href="" class="navbar-brand d-md-none" title="{{ .Site.Title }}">
                        {{ if and .Site.Data.settings .Site.Data.settings.logoUrl }}
                        <img src="{{ .Site.Data.settings.logoUrl }}" height="40" class="logo-light" alt="{{ .Site.Title }}">
                        <img src="{{ .Site.Data.settings.logoUrl }}" height="40" class="logo-dark d-none" alt="{{ .Site.Title }}">
                        {{ else }}
                        <img src="{{ absURL $.Site.Params.images.logoCollapseLight }}" class="logo-light" alt="{{ .Site.Title }}">
                        <img src="{{ absURL $.Site.Params.images.logoCollapseDark }}" class="logo-dark d-none" alt="{{ .Site.Title }}">
                        {{ end }}
                    </a>

                    <div class="collapse navbar-collapse order-2 order-md-1">
                        <div class="header-mini-btn">
                            <label>
                                <input id="mini-button" type="checkbox">
                                <svg viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                    <path class="line--1" d="M0 40h62c18 0 18-20-17 5L31 55"></path>
                                    <path class="line--2" d="M0 50h80"></path>
                                    <path class="line--3" d="M0 60h62c18 0 18 20-17-5L31 45"></path>
                                </svg>
                            </label>

                        </div>

                        <ul class="navbar-nav site-menu" style="margin-right: 16px;">
                        {{ range .Site.Data.headers }}
			<li {{ if .list }}class="menu-item-has-children"{{ end }}>
				<a href="{{ .link }}">
                                    <i class="{{ .icon }} fa-lg mr-2"></i>
                                    <span>{{ .item }}</span>
                                </a>
				<ul class="sub-menu">
				{{ range .list }}
				    <li><a href="{{ .url }}">{{ .name }}</a></li>
				{{ end }}
				</ul>
			    </li>
			{{ end }}
			</ul>

                        {{ if not (eq $.Site.Params.qweather.key "") }}
                        <div class="rounded-circle weather">
                            <div id="he-plugin-simple" style="display: contents;"></div>
                            <script>WIDGET = {
                                    CONFIG: {
                                        "modules": "01234",
                                        "background": 5,
                                        "tmpColor": "E4C600",
                                        "tmpSize": 14,
                                        "cityColor": "E4C600",
                                        "citySize": 14,
                                        "aqiColor": "#E4C600",
                                        "aqiSize": 14,
                                        "weatherIconSize": 24,
                                        "alertIconSize": 18,
                                        "padding": "10px 10px 10px 10px",
                                        "shadow": "1",
                                        "language": "auto",
                                        "borderRadius": 5,
                                        "fixed": "false",
                                        "vertical": "middle",
                                        "horizontal": "left",
                                        "key": "{{ $.Site.Params.qweather.key }}"
                                    }
                                }
                            </script>
                            <script src="https://widget.qweather.net/simple/static/js/he-simple-common.js?v=2.0"></script>
                        </div>
                        {{ end }}
                    </div>

                    <ul class="nav navbar-menu text-xs order-1 order-md-2">
                        <!-- 管理后台入口 -->
                        <li class="nav-item mr-3 mr-lg-0 d-none d-lg-block">
                            <a href="/admin" target="_blank" class="btn btn-sm btn-primary px-3" style="border-radius: 999px; line-height: 1.6; background-color: #0d6efd; border-color: #0d6efd; color: #fff;">进入管理后台</a>
                        </li>
                        <!-- 管理后台入口 end -->
                        <!--li class="nav-search ml-3 ml-md-4">
                            <a href="javascript:" data-toggle="modal" data-target="#search-modal"><i
                                    class="iconfont icon-search icon-2x"></i></a>
                        </li-->
                        <li class="nav-item d-md-none mobile-menu ml-3 ml-md-4">
                            <!-- 侧边栏按钮：使用自定义 JS toggle，不用 Bootstrap modal -->
                            <a href="javascript:" id="sidebar-switch"><i class="iconfont icon-classification icon-2x"></i></a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="placeholder" style="height:74px"></div>
    </div>
